# Election Night Scraper
# Runs every 3 minutes during election night to fetch updated results.
#
# HOW TO USE:
# 1. The scraper auto-discovers PDF links from the Marathon County results page —
#    no manual URL updates needed.
# 2. After results are final, re-comment the cron below to stop polling.

name: Scrape Election Results

on:
  # Runs every 3 min from 8 PM to midnight CT (01:00–05:00 UTC on Apr 8)
  schedule:
    - cron: '*/3 1-5 8 4 *'
  workflow_dispatch:  # Manual trigger always available

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/parse_results.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/election.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push updated results
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "WPR Election Bot"
          git config user.email "elections@wausaupilotandreview.com"
          git add public/data/election.json
          git commit -m "Update election results $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
